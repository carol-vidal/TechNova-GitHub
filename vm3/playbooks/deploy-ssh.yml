---
- name: Setup SSH key access from VM3 to all VMs for deploy user
  hosts: automation
  gather_facts: false
  become: true

  vars:
    ssh_key_path: /home/deploy/.ssh/id_ed25519
    ssh_pub_key_path: /home/deploy/.ssh/id_ed25519.pub
    ssh_targets:
      - srv-infra
      - srv-apps
      - srv-monit

  tasks:
    - name: Ensure .ssh directory exists on VM3
      ansible.builtin.file:
        path: /home/deploy/.ssh
        state: directory
        owner: deploy
        group: deploy
        mode: "0700"

    - name: Generate SSH key pair for deploy on VM3 if absent
      ansible.builtin.command: >
        ssh-keygen -t ed25519 -f {{ ssh_key_path }} -N ""
      args:
        creates: "{{ ssh_key_path }}"
      become: false

    - name: Read public key from VM3
      ansible.builtin.slurp:
        src: "{{ ssh_pub_key_path }}"
      register: deploy_pubkey
      become: false

    - name: Ensure deploy user SSH directory exists on remote hosts
      ansible.builtin.file:
        path: /home/deploy/.ssh
        state: directory
        owner: deploy
        group: deploy
        mode: "0700"
      delegate_to: "{{ item }}"
      loop: "{{ ssh_targets }}"

    - name: Add VM3 public key to authorized_keys on remote hosts
      ansible.builtin.authorized_key:
        user: deploy
        state: present
        key: "{{ deploy_pubkey.content | b64decode }}"
      delegate_to: "{{ item }}"
      loop: "{{ ssh_targets }}"

    - name: Ensure authorized_keys permissions are correct on remote hosts
      ansible.builtin.file:
        path: /home/deploy/.ssh/authorized_keys
        state: file
        owner: deploy
        group: deploy
        mode: "0600"
      delegate_to: "{{ item }}"
      loop: "{{ ssh_targets }}"
