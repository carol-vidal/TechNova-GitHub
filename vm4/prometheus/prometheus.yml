global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-vm1-infra'
    static_configs:
      - targets: ['10.0.0.10:9100']

  - job_name: 'node-vm2-apps'
    static_configs:
      - targets: ['10.0.0.20:9100']

  - job_name: 'node-vm3-auto'
    static_configs:
      - targets: ['10.0.0.30:9100']

  - job_name: 'node-vm4-monit'
    static_configs:
      - targets: ['10.0.0.40:9100']

  - job_name: 'app-api-health'
    metrics_path: /metrics
    static_configs:
      - targets: ['10.0.0.20:80']

  - job_name: 'cadvisor-vm2'
    static_configs:
      - targets: ['10.0.0.20:8080']

  - job_name: 'dns-bind9-vm1'
    static_configs:
      - targets: ['10.0.0.10:9153']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
