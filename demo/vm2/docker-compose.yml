# Stack TechNova adaptada para demo local (VM2 — srv-apps).
# Todos os serviços partilham a rede interna "technova-demo".
# Apenas as portas necessárias para acesso externo são mapeadas para o host.
# Uso: gerido automaticamente por start.sh / stop.sh

services:

  # Base de dados MySQL — apenas acessível internamente (sem port mapping para o host).
  mysql:
    image: mysql:8.0
    container_name: technova-demo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: technovaDemo2024
      MYSQL_DATABASE: technova_app
      MYSQL_USER: appuser
      MYSQL_PASSWORD: technovaDemo2024
    volumes:
      - mysql_demo_data:/var/lib/mysql
    networks:
      - technova-demo
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -ptechnovaDemo2024 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Aplicação Node.js — construída a partir de vm2-apps/app/Dockerfile.
  # Exposta apenas internamente na porta 3000; o acesso externo passa pelo Nginx.
  app:
    build:
      context: ../../vm2-apps/app
    container_name: technova-demo-app
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_USER: appuser
      DB_PASSWORD: technovaDemo2024
      DB_NAME: technova_app
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - technova-demo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Reverse proxy Nginx — único ponto de entrada para a app (porta 80).
  nginx:
    image: nginx:stable-alpine
    container_name: technova-demo-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - technova-demo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  # Prometheus — recolhe métricas da app e de si próprio.
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: technova-demo-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - ../../vm4-monit/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_demo_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=7d
    ports:
      - "9090:9090"
    networks:
      - technova-demo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/ready"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Alertmanager — recebe alertas do Prometheus e encaminha para o webhook listener.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: technova-demo-alertmanager
    restart: unless-stopped
    volumes:
      - ../../vm4-monit/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    networks:
      - technova-demo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9093/-/ready"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Loki — agregação de logs.
  loki:
    image: grafana/loki:3.1.1
    container_name: technova-demo-loki
    restart: unless-stopped
    volumes:
      - ../../vm4-monit/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_demo_data:/loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    networks:
      - technova-demo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Grafana — dashboards e visualização.
  grafana:
    image: grafana/grafana:11.1.5
    container_name: technova-demo-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: technova2024
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - grafana_demo_data:/var/lib/grafana
      - ../../vm4-monit/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../../vm4-monit/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../vm4-monit/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ../../vm4-monit/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - technova-demo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Webhook Listener — servidor Python que recebe alertas do Alertmanager.
  webhook-listener:
    build:
      context: ../../vm4-monit/webhook
    container_name: technova-demo-webhook
    restart: unless-stopped
    ports:
      - "5001:5001"
    networks:
      - technova-demo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5001/"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  technova-demo:
    driver: bridge

volumes:
  mysql_demo_data:
  prometheus_demo_data:
  grafana_demo_data:
  loki_demo_data:
