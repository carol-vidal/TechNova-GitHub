# Configuração Nginx para demo local.
# Diferença face à produção (vm2-apps/nginx/default.conf):
#   - /metrics não tem ACL de IP (em produção restringe a 10.0.0.0/24)
#     porque no demo acedemos a partir do host, fora da rede Docker interna.
# Todo o tráfego externo entra por esta porta 80 e é encaminhado para a app (porta 3000 interna).

server {
  listen 80;
  server_name _;

  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  # Rota principal — encaminha tudo para a app Node.js.
  location / {
    proxy_pass         http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
  }

  # Endpoint de métricas Prometheus — sem ACL no demo (em produção: allow 10.0.0.0/24; deny all).
  location /metrics {
    proxy_pass http://app:3000/metrics;
  }

  # Health check — usado pelos healthchecks do Docker e pelo Prometheus.
  location /api/health {
    proxy_pass http://app:3000/api/health;
  }
}
